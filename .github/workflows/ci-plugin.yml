name: Plugin CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Cortex CLI
        run: |
          bun add -g @cortex.md/cli
          cortex -v

      - name: Install dependencies
        run: bun install

      - name: Build plugin
        run: cortex plugin build .

      - name: Validate plugin
        run: cortex plugin validate . --strict
